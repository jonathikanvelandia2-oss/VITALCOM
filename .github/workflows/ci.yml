name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --prefer-offline

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/vitalcom_ci?schema=public
          DIRECT_URL: postgresql://user:pass@localhost:5432/vitalcom_ci?schema=public
          NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key-long-enough
          SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-long-enough
          NEXTAUTH_SECRET: ci-placeholder-secret-that-is-at-least-32-characters-long
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NODE_ENV: production

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: false # activar cuando vitest est\u00e9 configurado (V2.5)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --prefer-offline

      - name: Run tests
        run: npm test -- --run
